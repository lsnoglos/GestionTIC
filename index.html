<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --bg:#f2f5fb;
        --bg-soft:#f7f9fd;
        --card:#ffffff;
        --line:#d9e1ef;
        --primary:#1e4fa3;
        --primary-dark:#173f83;
        --text:#1f2d45;
        --muted:#5e6f89;
        --success:#0f7a2f;
        --error:#b42318;
        --shadow:0 8px 24px rgba(16, 42, 86, 0.08);
      }
      body {
        margin:0;
        font-family:"Inter","Segoe UI","Helvetica Neue",Arial,sans-serif;
        background:linear-gradient(180deg, #f7f9fd 0%, var(--bg) 100%);
        color:var(--text);
        letter-spacing:.1px;
      }
      .container { max-width:980px; margin:28px auto; padding:0 16px 24px; }
      .card {
        background:var(--card);
        border:1px solid var(--line);
        border-radius:14px;
        padding:18px;
        margin-bottom:16px;
        box-shadow:var(--shadow);
      }
      h1,h2,h3 { margin:0 0 10px; color:#173054; }
      h1 { font-size:28px; letter-spacing:.2px; }
      h2 { font-size:20px; }
      .row { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
      label { font-size:13px; font-weight:700; display:block; margin-bottom:6px; color:#2f3f5f; }
      input,select,textarea,button {
        width:100%;
        box-sizing:border-box;
        padding:10px 11px;
        border-radius:10px;
        border:1px solid #c5d1e4;
        background:#fff;
        transition:border-color .2s ease, box-shadow .2s ease, background-color .2s ease, transform .08s ease;
      }
      input:focus,select:focus,textarea:focus {
        outline:none;
        border-color:#7aa0de;
        box-shadow:0 0 0 3px rgba(37, 95, 177, .16);
      }
      textarea { min-height:72px; resize:vertical; }
      button {
        background:linear-gradient(180deg, #2e63ba 0%, var(--primary) 100%);
        color:#fff;
        border:none;
        font-weight:700;
        cursor:pointer;
      }
      button:hover { background:linear-gradient(180deg, #2b5eb2 0%, var(--primary-dark) 100%); }
      button:active { transform:translateY(1px); }
      button.secondary { background:linear-gradient(180deg, #6b7a91 0%, #596780 100%); }
      button.ghost { background:#f3f6fd; color:#22457f; border:1px solid #bccae2; }
      .inline { display:flex; gap:8px; align-items:end; }
      .inline > * { flex:1; }
      .hidden { display:none; }
      .muted { color:var(--muted); font-size:13px; }
      .status { margin-top:8px; font-weight:700; }
      .badge { display:inline-block; border-radius:999px; padding:4px 10px; font-size:12px; color:#fff; margin-right:6px; }
      .badge.alumno { background:#2d5ea7; }
      .badge.personal { background:#0d6f67; }
      .profile-header { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; }
      .summary { font-size:14px; }
      #signatureCanvas { width:100%; height:180px; border:1px dashed #98aac7; border-radius:10px; touch-action:none; background:var(--bg-soft); }
      .signature-preview { max-width:260px; border:1px solid #ccd7eb; border-radius:10px; padding:6px; background:#fff; }
      .history-item { border:1px solid var(--line); border-radius:10px; padding:10px; margin-bottom:8px; background:#f9fbff; }
      #globalLoading {
        position:fixed; inset:0; background:rgba(243, 247, 253, .9);
        display:flex; align-items:center; justify-content:center;
        z-index:9999;
      }
      #globalLoading img { width:120px; height:120px; }
      details { border:1px solid #d4deec; border-radius:10px; padding:10px; background:#fcfdff; }
      details > summary { cursor:pointer; font-weight:700; }
      .field-disabled { opacity:.75; }
      .blocked-label { font-size:12px; font-weight:700; color:var(--error); margin-left:6px; }
      .input-error { border-color:#d92d20 !important; box-shadow:0 0 0 2px rgba(217,45,32,.12); }
      @media (max-width: 640px) {
        .container { margin:18px auto; padding:0 12px 18px; }
        .card { padding:14px; border-radius:12px; }
        h1 { font-size:24px; }
      }
    </style>
  </head>
  <body>
    <div id="globalLoading"><img src="https://usagif.com/wp-content/uploads/loading-96.gif" alt="Cargando" /></div>

    <div class="container">
      <div class="card">
        <h1 id="appTitle">Registro TIC</h1>
        <p class="muted">Ingresa usuario (carnet o correo institucional) y registra la asistencia.</p>
      </div>

      <div class="card">
        <h2>1) Buscar usuario</h2>
        <div class="inline">
          <div>
            <label>Usuario</label>
            <input id="reference" />
          </div>
          <button id="btnSearch">Buscar</button>
        </div>
        <div id="searchMsg" class="status"></div>
      </div>

      <div id="userCard" class="card hidden">
        <h2>2) Información de usuario</h2>
        <div class="profile-header">
          <div>
            <span id="userTypeBadge" class="badge alumno">Alumno</span>
            <span id="modeBadge" class="muted"></span>
          </div>
          <button id="btnEditProfile" class="ghost hidden" type="button">✏️ Editar</button>
        </div>

        <div id="userDetails" class="hidden">
          <div class="row" style="margin-top:10px;">
            <div>
              <label>Usuario buscado</label>
              <input id="searchedUser" disabled class="field-disabled" />
            </div>
            <div>
              <label>Contraseña <span id="pinBlockedTag" class="blocked-label hidden">BLOQUEADA</span></label>
              <input id="pin" type="password" />
            </div>
          </div>

          <details id="profileAccordion" style="margin-top:12px;">
            <summary>Perfil de usuario</summary>
            <div class="row" style="margin-top:10px;">
              <div>
                <label>Nombre y apellido</label>
                <input id="fullName" />
              </div>
              <div>
                <label>Género</label>
                <select id="gender">
                  <option value="">Selecciona...</option>
                  <option value="M">M</option>
                  <option value="F">F</option>
                </select>
              </div>
              <div>
                <label id="labelCareerArea">Carrera</label>
                <select id="careerArea"></select>
              </div>
            </div>

            <h3 style="margin-top:16px;">Firma</h3>
            <div id="signaturePreviewWrap" class="hidden">
              <p class="muted">Firma registrada:</p>
              <img id="signaturePreview" class="signature-preview" alt="Firma registrada" />
            </div>
            <div id="signatureCanvasWrap" class="hidden">
              <p class="muted">Dibuja firma nueva si necesitas actualizarla.</p>
              <canvas id="signatureCanvas"></canvas>
              <div class="inline" style="margin-top:8px;">
                <button id="btnClearSign" type="button" class="secondary">Limpiar firma</button>
              </div>
            </div>
          </details>
        </div>
      </div>

      <div id="visitCard" class="card hidden">
        <h2>3) Motivo de asistencia</h2>
        <div class="row">
          <div>
            <label>Categoría</label>
            <select id="category"></select>
          </div>
          <div>
            <label>Motivo</label>
            <select id="reason"></select>
          </div>
          <div>
            <label>Observación</label>
            <textarea id="observation" placeholder="Opcional"></textarea>
          </div>
        </div>
        <div style="margin-top:10px;">
          <button id="btnSave">Guardar registro</button>
          <div id="saveMsg" class="status"></div>
        </div>
      </div>

      <div id="historyCard" class="card hidden">
        <details>
          <summary>Histórico de asistencias</summary>
          <div id="historyList" style="margin-top:10px;"></div>
        </details>
      </div>
    </div>

    <script>
      const REASON_MAP = {
        'Sistemas': ['Plataforma virtual', 'Portal de alumnos', 'Portal de maestros', 'SIAGES', 'SIRACI'],
        'Soporte': ['Asistencia ofimática', 'Red', 'Impresora', 'Computadora'],
        'Otros': ['Instalación de programa', 'Instalación de sistema', 'Instalación de red', 'Instalación de dispositivo', 'Otros']
      };

      const state = {
        existingUser: false,
        inferredType: 'alumno',
        hasDrawn: false,
        allowProfileEdit: false,
        signatureUrl: '',
        signatureDraftUrl: '',
        careers: [],
        areas: []
      };

      let canvas, ctx, drawing = false;

      function setGlobalLoading(isLoading) {
        document.getElementById('globalLoading').style.display = isLoading ? 'flex' : 'none';
      }

      function initSignatureCanvas() {
        canvas = document.getElementById('signatureCanvas');
        ctx = canvas.getContext('2d');
        resizeCanvas();
        ctx.strokeStyle = '#0d1e46';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';

        const start = (x, y) => { drawing = true; ctx.beginPath(); ctx.moveTo(x, y); state.hasDrawn = true; };
        const move = (x, y) => { if (!drawing) return; ctx.lineTo(x, y); ctx.stroke(); state.hasDrawn = true; };
        const end = () => {
          drawing = false;
          state.hasDrawn = isCanvasNotBlank();
          state.signatureDraftUrl = state.hasDrawn ? canvas.toDataURL('image/png') : '';
        };

        const pos = (e) => {
          const rect = canvas.getBoundingClientRect();
          if (e.touches && e.touches[0]) {
            return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
          }
          return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        };

        canvas.addEventListener('mousedown', e => { const p = pos(e); start(p.x, p.y); });
        canvas.addEventListener('mousemove', e => { const p = pos(e); move(p.x, p.y); });
        window.addEventListener('mouseup', end);

        canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = pos(e); start(p.x, p.y); }, { passive: false });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); const p = pos(e); move(p.x, p.y); }, { passive: false });
        canvas.addEventListener('touchend', end);

        window.addEventListener('resize', resizeCanvas);
      }

      function resizeCanvas() {
        const previousImage = state.signatureDraftUrl || (canvas.width ? canvas.toDataURL('image/png') : '');
        const ratio = window.devicePixelRatio || 1;
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        canvas.width = width * ratio;
        canvas.height = height * ratio;
        ctx = canvas.getContext('2d');
        ctx.scale(ratio, ratio);
        ctx.clearRect(0, 0, width, height);

        if (previousImage) {
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0, width, height);
            state.hasDrawn = isCanvasNotBlank();
            state.signatureDraftUrl = state.hasDrawn ? canvas.toDataURL('image/png') : '';
          };
          img.src = previousImage;
        }
      }

      function clearSign() {
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
        state.hasDrawn = false;
        state.signatureDraftUrl = '';
      }

      function isCanvasNotBlank() {
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        for (let i = 3; i < data.length; i += 4) {
          if (data[i] !== 0) return true;
        }
        return false;
      }

      function setStatus(id, msg, ok = true) {
        const el = document.getElementById(id);
        el.style.color = ok ? 'var(--success)' : 'var(--error)';
        el.textContent = msg;
      }

      function getErrorMessage(err, fallback) {
        if (!err) return fallback;
        if (typeof err === 'string') return err;
        if (typeof err.message === 'string' && err.message.trim()) return err.message;
        return fallback;
      }

      function normalizeSearchResult(result) {
        if (!result || typeof result !== 'object') {
          return {
            found: false,
            reference: document.getElementById('reference').value.trim(),
            inferredType: inferTypeFromReference(),
            user: null,
            history: []
          };
        }
        return {
          found: Boolean(result.found),
          reference: result.reference || document.getElementById('reference').value.trim(),
          inferredType: result.inferredType || inferTypeFromReference(),
          user: result.user || null,
          history: Array.isArray(result.history) ? result.history : []
        };
      }

      function normalizeSaveResult(result) {
        if (!result || typeof result !== 'object') {
          return { message: 'Registro guardado correctamente.', history: [] };
        }
        return {
          message: result.message || 'Registro guardado correctamente.',
          history: Array.isArray(result.history) ? result.history : []
        };
      }

      function inferTypeFromReference() {
        const ref = document.getElementById('reference').value.trim();
        return /^[A-Z0-9._%+-]+@([A-Z0-9.-]+\.[A-Z]{2,})?$/i.test(ref) ? 'personal' : 'alumno';
      }

      function fillSelect(el, values, label = 'Selecciona...') {
        el.innerHTML = `<option value="">${label}</option>`;
        values.forEach(value => {
          const op = document.createElement('option');
          op.value = value;
          op.textContent = value;
          el.appendChild(op);
        });
      }

      function setProfileEditMode(enabled) {
        state.allowProfileEdit = enabled;
        const fullName = document.getElementById('fullName');
        const gender = document.getElementById('gender');
        const careerArea = document.getElementById('careerArea');

        const shouldLock = state.existingUser && !enabled;
        fullName.disabled = shouldLock;
        gender.disabled = shouldLock;
        careerArea.disabled = shouldLock;
        fullName.classList.toggle('field-disabled', shouldLock);
        gender.classList.toggle('field-disabled', shouldLock);
        careerArea.classList.toggle('field-disabled', shouldLock);

        document.getElementById('btnEditProfile').textContent = enabled ? '✅ Listo' : '✏️ Editar';
        const showCanvas = !state.existingUser || enabled;
        document.getElementById('signatureCanvasWrap').classList.toggle('hidden', !showCanvas);
        document.getElementById('signaturePreviewWrap').classList.toggle('hidden', !state.signatureUrl);

        if (showCanvas) requestAnimationFrame(resizeCanvas);
        if (!enabled) clearSign();
      }

      function setPinError(enabled) {
        const pinInput = document.getElementById('pin');
        pinInput.classList.toggle('input-error', Boolean(enabled));
        if (enabled) pinInput.focus();
      }

      function applyTypeUI(type) {
        const isStudent = type === 'alumno';
        const label = document.getElementById('labelCareerArea');
        const badge = document.getElementById('userTypeBadge');

        label.textContent = isStudent ? 'Carrera' : 'Área';
        badge.textContent = isStudent ? 'Alumno' : 'Personal';
        badge.className = `badge ${isStudent ? 'alumno' : 'personal'}`;

        const options = isStudent ? state.careers : state.areas;
        fillSelect(document.getElementById('careerArea'), options);
      }

      function paintHistory(items) {
        const host = document.getElementById('historyList');
        host.innerHTML = '';
        if (!items.length) {
          host.innerHTML = '<p class="muted">Sin registros previos.</p>';
          return;
        }

        items.forEach(it => {
          const when = it.fechaHora || `${it.fecha || ''} ${it.hora || ''}`.trim();
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `<strong>${when}</strong><br>${it.categoria} - ${it.motivo}<br><span class="muted">Obs: ${it.observacion || '---'}</span>`;
          host.appendChild(div);
        });
      }

      function applyUserData(result) {
        const safeResult = normalizeSearchResult(result);

        document.getElementById('userCard').classList.remove('hidden');
        document.getElementById('visitCard').classList.remove('hidden');
        document.getElementById('historyCard').classList.remove('hidden');
        document.getElementById('userDetails').classList.remove('hidden');

        state.existingUser = safeResult.found;
        state.inferredType = safeResult.found && safeResult.user ? safeResult.user.userType : safeResult.inferredType;
        applyTypeUI(state.inferredType);

        const modeBadge = document.getElementById('modeBadge');
        const editBtn = document.getElementById('btnEditProfile');
        const pinBlockedTag = document.getElementById('pinBlockedTag');
        const profileAccordion = document.getElementById('profileAccordion');
        document.getElementById('searchedUser').value = safeResult.reference;
        setPinError(false);

        if (safeResult.found && safeResult.user) {
          document.getElementById('fullName').value = safeResult.user.fullName || '';
          document.getElementById('gender').value = safeResult.user.gender || '';
          document.getElementById('careerArea').value = safeResult.user.careerArea || '';
          modeBadge.textContent = 'Usuario existente (bloqueado)';
          editBtn.classList.add('hidden');
          pinBlockedTag.classList.remove('hidden');
          profileAccordion.open = false;
          state.signatureUrl = safeResult.user.signatureUrl || '';
          document.getElementById('signaturePreview').src = state.signatureUrl;
          setStatus('searchMsg', 'Usuario encontrado. Puedes continuar con el motivo de asistencia.');
        } else {
          document.getElementById('fullName').value = '';
          document.getElementById('gender').value = '';
          document.getElementById('careerArea').value = '';
          document.getElementById('pin').value = '';
          modeBadge.textContent = 'Usuario nuevo';
          editBtn.classList.add('hidden');
          pinBlockedTag.classList.add('hidden');
          profileAccordion.open = true;
          state.signatureUrl = '';
          document.getElementById('signaturePreview').removeAttribute('src');
          setStatus('searchMsg', 'Usuario nuevo. Completa nombre, carrera/área, firma y clave.');
        }

        setProfileEditMode(!safeResult.found);
        paintHistory(safeResult.history);
      }

      function searchUser() {
        const ref = document.getElementById('reference').value.trim();
        if (!ref) return setStatus('searchMsg', 'Escribe un usuario primero.', false);

        setStatus('searchMsg', 'Buscando...', true);
        setGlobalLoading(true);
        google.script.run
          .withSuccessHandler(result => {
            try {
              applyUserData(result);
            } catch (err) {
              const message = getErrorMessage(err, 'Ocurrió un error al procesar la búsqueda.');
              setStatus('searchMsg', message, false);
            } finally {
              setGlobalLoading(false);
            }
          })
          .withFailureHandler(err => {
            const message = getErrorMessage(err, 'Ocurrió un error al buscar el usuario.');
            setStatus('searchMsg', message, false);
            setGlobalLoading(false);
          })
          .findUserAndHistory(ref.trim().toUpperCase());
      }

      function getSignaturePayload() {
        const shouldSend = !state.existingUser || state.allowProfileEdit;
        return shouldSend && isCanvasNotBlank() ? canvas.toDataURL('image/png') : '';
      }

      function saveVisit() {
        setPinError(false);
        const payload = {
          reference: document.getElementById('searchedUser').value.trim(),
          fullName: document.getElementById('fullName').value.trim(),
          gender: document.getElementById('gender').value,
          careerArea: document.getElementById('careerArea').value,
          pin: document.getElementById('pin').value,
          category: document.getElementById('category').value,
          reason: document.getElementById('reason').value,
          observation: document.getElementById('observation').value.trim(),
          signatureDataUrl: getSignaturePayload(),
          allowProfileEdit: state.allowProfileEdit
        };

        setStatus('saveMsg', 'Guardando...', true);
        setGlobalLoading(true);
        google.script.run
          .withSuccessHandler(res => {
            try {
              const safeRes = normalizeSaveResult(res);
              setStatus('saveMsg', safeRes.message, true);
              paintHistory(safeRes.history);
              document.getElementById('observation').value = '';
              clearSign();
              if (state.existingUser && state.allowProfileEdit) setProfileEditMode(false);
            } catch (err) {
              const message = getErrorMessage(err, 'Se guardó, pero hubo un error al actualizar la pantalla.');
              setStatus('saveMsg', message, false);
            } finally {
              setGlobalLoading(false);
            }
          })
          .withFailureHandler(err => {
            const message = getErrorMessage(err, 'Ocurrió un error al guardar el registro.');
            if (/clave|contraseñ|pin/i.test(message)) setPinError(true);
            setStatus('saveMsg', message, false);
            setGlobalLoading(false);
          })
          .saveVisit(payload);
      }

      function loadReasonsByCategory() {
        const category = document.getElementById('category').value;
        const reasons = REASON_MAP[category] || [];
        fillSelect(document.getElementById('reason'), reasons);
      }

      document.addEventListener('DOMContentLoaded', () => {
        initSignatureCanvas();

        fillSelect(document.getElementById('category'), Object.keys(REASON_MAP));
        fillSelect(document.getElementById('reason'), []);

        google.script.run.withSuccessHandler(data => {
          document.getElementById('appTitle').textContent = data.appName;
          state.careers = data.careers || [];
          state.areas = data.areas || [];
          setGlobalLoading(false);
        }).withFailureHandler(() => {
          setGlobalLoading(false);
        }).getAppBootstrap();

        document.getElementById('btnSearch').addEventListener('click', searchUser);
        document.getElementById('btnSave').addEventListener('click', saveVisit);
        document.getElementById('btnClearSign').addEventListener('click', clearSign);
        document.getElementById('btnEditProfile').addEventListener('click', () => {
          setProfileEditMode(!state.allowProfileEdit);
        });
        document.getElementById('category').addEventListener('change', loadReasonsByCategory);
      });
    </script>
  </body>
</html>
